name: Release on Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          uname -m

      - name: Build release app
        run: swift build -c release --product KasetApp

      - name: Create app bundle
        run: |
          mkdir -p "dist/Kaset.app/Contents/MacOS"
          mkdir -p "dist/Kaset.app/Contents/Resources"
          cp .build/release/KasetApp "dist/Kaset.app/Contents/MacOS/Kaset"
          chmod +x "dist/Kaset.app/Contents/MacOS/Kaset"

      - name: Create Info.plist
        run: |
          cat > "dist/Kaset.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Kaset</string>
            <key>CFBundleIdentifier</key>
            <string>com.paulqu.kaset</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Kaset</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Package DMG
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p release
          hdiutil create -volname "Kaset $VERSION" -srcfolder dist -ov -format UDZO "release/Kaset-${VERSION}-arm64.dmg"

      - name: Create checksum
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cd release
          shasum -a 256 "Kaset-${VERSION}-arm64.dmg" > "checksums-${VERSION}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/*

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          gh release create "$VERSION" \
            --title "Kaset $VERSION" \
            --notes "Kaset macOS app for Apple Silicon" \
            release/Kaset-${VERSION}-arm64.dmg \
            release/checksums-${VERSION}.txt
